<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=apps/mitsumori_app/">
  <title>工事見積アプリを開く</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Yu Gothic", "Meiryo", sans-serif;
      background: #edf2f3;
      color: #182026;
    }
    main {
      width: min(560px, calc(100% - 32px));
      padding: 24px;
      border: 1px solid #d6dde3;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 42px rgba(24, 32, 38, 0.08);
      text-align: center;
    }
    h1 { margin: 0 0 10px; font-size: 24px; }
    p { margin: 0 0 18px; color: #5f6c76; line-height: 1.7; }
    a {
      display: inline-block;
      border-radius: 6px;
      padding: 10px 16px;
      background: #0f6b65;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
  <script>
    window.location.replace("apps/mitsumori_app/");
  </script>
</head>
<body>
  <main>
    <h1>工事見積アプリを開いています</h1>
    <p>自動で開かない場合は、下のボタンを押してください。</p>
    <a href="apps/mitsumori_app/">工事見積アプリを開く</a>
  </main>
</body>
</html>
